<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado!</title>
    <style>
        /* Estilos para deixar a página bonita e centralizada */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8; /* Azul bem clarinho de fundo */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 4px solid #4CAF50; /* Borda verde combinando com o botão do formulário */
        }

        h1 {
            font-size: 2.5rem;
            color: #2d5a27;
            margin-bottom: 10px;
            font-weight: 900;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }

        .cat-gif {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-voltar {
            margin-top: 25px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-voltar:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>OBRIGADO!</h1>
        <p>Sua opinião foi enviada com sucesso e o gatinho está muito feliz!</p>
        
        <img src="https://media.tenor.com/BwArbEoCbncAAAAM/happy-dance-cat.gif" 
             alt="Happy Dance Cat GIF" 
             class="cat-gif">

        <br>
        <a href="https://formulariomick205.netlify.app/" onclick="location.reload(true);"></a>

<button onclick="window.location.href='https://formulariomick205.netlify.app/';" style="background-color: #2ecc71; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;">
  Voltar para o início
</button>
    </div>

</body>
</html>
